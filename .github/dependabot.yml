# Dependabot — GitHub Actions version pinning
# S44-T-SEC-01: keep Actions SHA-pinned via Dependabot PRs.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: 'ci'
      include: scope
