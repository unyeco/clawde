# nSelf-First CI gate — rejects side-channel Docker Compose files.
#
# Drop into any nSelf repo at .github/workflows/nself-first-check.yml
# Doctrine: ~/Sites/nself/.claude/docs/doctrines/nself-first.md
# Audit:    ~/Sites/nself/.claude/docs/doctrines/nself-first-compose-audit.md

name: nSelf-First Check

on:
  pull_request:
    paths:
      - '**/docker-compose*.yml'
      - '**/docker-compose*.yaml'

jobs:
  compose-header-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify docker-compose headers
        run: |
          set -e
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          FILES=$(git diff --name-only --diff-filter=AM "$BASE" "$HEAD" -- '**/docker-compose*.yml' '**/docker-compose*.yaml' || true)

          if [ -z "$FILES" ]; then
            echo "No compose files changed — OK."
            exit 0
          fi

          FAIL=0
          for f in $FILES; do
            # task/ is the D6 any-stack exception — whitelisted globally.
            case "$f" in
              task/backend/*) echo "SKIP (D6 task/ exception): $f"; continue ;;
              *docker-compose.plugin.yml) echo "SKIP (plugin-fragment): $f"; continue ;;
            esac

            head -5 "$f" | grep -qE '^# (GENERATED BY nself build|NSELF-FIRST EXCEPTION:|DEPRECATED — side-channel compose)' && {
              echo "OK: $f"
              continue
            }

            echo "FAIL: $f is missing an approved nSelf-First header."
            echo "  Required header (one of):"
            echo "    # GENERATED BY nself build — DO NOT HAND EDIT"
            echo "    # NSELF-FIRST EXCEPTION: <plugin-fragment|d6-any-stack|b-type-distribution|cli-internal-template>"
            echo "    # DEPRECATED — side-channel compose, removal tracked in nself-first-cli-gaps.md"
            echo "  See doctrine: ~/Sites/nself/.claude/docs/doctrines/nself-first.md"
            FAIL=1
          done
          exit $FAIL
