name: clawde
description: ClawDE — host-first AI developer environment (macOS, Windows, Linux, iOS, Android)
publish_to: "none"
version: 0.3.1+4

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # ClawDE packages
  clawd_proto:
    path: ../packages/clawd_proto
  clawd_client:
    path: ../packages/clawd_client
  clawd_core:
    path: ../packages/clawd_core
  clawd_ui:
    path: ../packages/clawd_ui

  # WebSocket / JSON-RPC transport (clawd IPC on port 4300)
  web_socket_channel: ^3.0.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Window management + resizable split panes
  window_manager: ^0.4.3
  split_view: ^3.0.0

  # System tray (macOS/Windows/Linux)
  tray_manager: ^0.2.3

  # Native folder/file picker
  file_selector: ^1.0.3

  # Code editor — CodeMirror 6 via WebView
  webview_flutter: ^4.10.0

  # App version
  package_info_plus: ^8.1.2

  # Open URLs in browser (GitHub links, release notes)
  url_launcher: ^6.3.1

  # Deep links (clawde:// scheme on macOS/Windows/Linux)
  app_links: ^6.3.0

  # Global hotkeys (system-wide summon shortcut)
  hotkey_manager: ^0.2.0

  # QR code display (Connection settings — scan from mobile)
  qr_flutter: ^4.1.0

  # Auto-update (Sparkle for macOS / WinSparkle for Windows)
  auto_updater: ^1.0.0

  # Local storage (session persistence)
  sqflite_common_ffi: ^2.3.4
  path_provider: ^2.1.5
  path: ^1.9.0

  # JSON serialization
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.1

  # P99 S1.21 T2 — launcher icons standardization
  flutter_launcher_icons: ^0.14.0

# Launcher icons — generates platform icons from a single source PNG.
# Standardized across nclaw / ntv / clawde apps. Source: brand canonical icon-1k.png (1024×1024).
# Run: `dart run flutter_launcher_icons` to regenerate platform icons.
flutter_launcher_icons:
  ios: true
  android: "launcher_icon"
  image_path: "../../.github/wiki/brand/icons/icon-1k.png"
  remove_alpha_ios: true
  min_sdk_android: 24
  adaptive_icon_background: "#030712"
  adaptive_icon_foreground: "../../.github/wiki/brand/icons/icon-1k.png"
  macos:
    generate: true
    image_path: "../../.github/wiki/brand/icons/icon-1k.png"
  windows:
    generate: true
    image_path: "../../.github/wiki/brand/icons/icon-1k.png"
    icon_size: 256

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/tray_icon.png
    - assets/tray_icon_connected.png
    - assets/tray_icon_error.png
    - assets/editor/
