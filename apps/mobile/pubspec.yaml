name: clawde_mobile
description: ClawDE — AI developer environment companion app (iOS + Android).
publish_to: "none"
version: 0.3.1+4

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # ClawDE packages
  clawd_proto:
    path: ../packages/clawd_proto
  clawd_client:
    path: ../packages/clawd_client
  clawd_core:
    path: ../packages/clawd_core
  clawd_ui:
    path: ../packages/clawd_ui

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Local storage (session persistence)
  shared_preferences: ^2.3.0

  # URL launcher (GitHub link in Settings)
  url_launcher: ^6.3.1

  # QR code scanning (for mobile → desktop host pairing)
  mobile_scanner: ^6.0.0

  # LAN discovery via mDNS
  multicast_dns: ^0.3.2

  # App version info
  package_info_plus: ^8.1.3

  # Local notifications
  flutter_local_notifications: ^17.2.3

  # Offline cache — local SQLite for cached sessions/messages
  sqflite: ^2.4.2
  path: ^1.9.0

  # Deep links
  app_links: ^6.3.3

  # Push notifications (FCM)
  firebase_messaging: ^15.1.6
  firebase_core: ^3.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # P99 S1.21 T2 — launcher icons standardization
  flutter_launcher_icons: ^0.14.0

# Launcher icons — generates platform icons from a single source PNG.
# Standardized across nclaw / ntv / clawde apps. Source: brand canonical icon-1k.png (1024×1024).
# Run: `dart run flutter_launcher_icons` to regenerate platform icons.
flutter_launcher_icons:
  ios: true
  android: "launcher_icon"
  image_path: "../../.github/wiki/brand/icons/icon-1k.png"
  remove_alpha_ios: true
  min_sdk_android: 24
  adaptive_icon_background: "#030712"
  adaptive_icon_foreground: "../../.github/wiki/brand/icons/icon-1k.png"

flutter:
  uses-material-design: true
